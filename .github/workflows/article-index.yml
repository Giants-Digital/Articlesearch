name: Build Article Index

on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scrape sitemaps and hydrate thumbnails
        run: |
          node --max-old-space-size=4096 << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const MAX_THUMBS_PER_RUN = 1000;
          const MAX_DATE_CORRECTIONS = 500;
          const MAX_DESC_BACKFILL = 500;
          const BATCH_SIZE = 5;

          function get(url) {
            return new Promise((resolve, reject) => {
              const req = https.get(url, { headers: { 'User-Agent': 'Mozilla/5.0' } }, res => {
                if (res.statusCode === 301 || res.statusCode === 302) {
                  return get(res.headers.location).then(resolve).catch(reject);
                }
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              });
              req.on('error', reject);
              req.setTimeout(10000, () => { req.destroy(); reject(new Error('timeout')); });
            });
          }

          function extractOgImage(html) {
            const metaRegex = /<meta[^>]+>/gi;
            let match;
            while ((match = metaRegex.exec(html)) !== null) {
              const tag = match[0];
              if (tag.includes('og:image') || tag.includes('twitter:image')) {
                const content = tag.match(/content="([^"]+)"/);
                if (content && !content[1].startsWith('data:')) return content[1];
              }
            }
            return '';
          }

          function extractDate(html) {
            const d3Match = html.match(/class="d3-o-media-object__date"[^>]*>\s*([^<]+?)\s*<\//);
            if (d3Match) return d3Match[1].trim();

            const ogMatch = html.match(/<meta[^>]+property="article:published_time"[^>]+content="([^"]+)"/);
            if (ogMatch) return ogMatch[1];

            const timeMatch = html.match(/<time[^>]+datetime="([^"]+)"/);
            return timeMatch ? timeMatch[1] : '';
          }

          function extractDescription(html) {
            const ogMatch = html.match(/<meta[^>]+property="og:description"[^>]+content="([^"]+)"/) ||
                  html.match(/<meta[^>]+content="([^"]+)"[^>]+property="og:description"/);
            if (ogMatch) return ogMatch[1];
            const nameMatch = html.match(/<meta[^>]+name="description"[^>]+content="([^"]+)"/) ||
                    html.match(/<meta[^>]+content="([^"]+)"[^>]+name="description"/);
            return nameMatch ? nameMatch[1] : '';
          }

          async function main() {
            let existing = new Map();
            try {
              const data = JSON.parse(fs.readFileSync('articles.json', 'utf8'));
              data.forEach(v => { if (v.url) existing.set(v.url, v); });
              console.log(`Loaded ${existing.size} existing news`);
            } catch (e) {
              console.log('No existing articles.json, starting fresh');
            }

            let cleanedCount = 0;
            existing.forEach(v => {
              if (v.thumb && /\/t_lazy\//i.test(v.thumb)) {
                v.thumb = v.thumb.replace(/\/t_lazy\//gi, '/');
                cleanedCount++;
              }
            });

            let titleCleanedCount = 0;
            existing.forEach(v => {
              if (!v.title) return;
              const cleaned = v.title.replace(/^video\s+/i, '').replace(/\s+/g, ' ').trim();
              if (cleaned !== v.title) {
                v.title = cleaned;
                titleCleanedCount++;
              }
            });

            const news = new Map(existing);
            const now = new Date();

            
          const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

          for (const letter of letters) {
            const url = `https://www.giants.com/sitemap/${letter}`;
          
            console.log(`Fetching ${url}`);
          
            try {
              const html = await get(url);
          
              const linkRegex = /href="([^"]*\/news\/[^"]*)"/gi;
          
              let match;
          
              while ((match = linkRegex.exec(html)) !== null) {
          
                const href = match[1];
          
                const fullUrl = href.startsWith("http")
                  ? href
                  : `https://www.giants.com${href}`;
          
                if (
                  fullUrl.includes("/news/index") ||
                  fullUrl.includes("/news/newsletter") ||
                  fullUrl.includes("/news/transcripts") ||
                  fullUrl.includes("/news/cover3") ||
                  fullUrl.includes("/news/factorfiction")
                ) {
                  continue;
                }
          
                if (!news.has(fullUrl)) {
                  news.set(fullUrl, {
                    title: fullUrl.split("/").pop().replace(/-/g, " "),
                    url: fullUrl,
                    thumb: "",
                    date: "",
                    dateVerified: false
                  });
                }
              }
          
            } catch (e) {
              console.warn(`Skipping ${url}: ${e.message}`);
            }
          
            await new Promise(r => setTimeout(r, 150));
          }

            // --- Manual overrides ---
            const overrides = [];
            overrides.forEach(v => { if (!news.has(v.url)) news.set(v.url, v); });
            
            console.log(`Total news: ${news.size}`);
            console.log('Hydrating thumbnails...');
            
            let hydrated = 0;       
            
            for (const article of news.values()) {

            if (article.thumb) continue;

            if (hydrated >= MAX_THUMBS_PER_RUN) {
              console.log(`Reached hydration limit of ${MAX_THUMBS_PER_RUN}`);
              break;
            }

          try {
          const html = await get(article.url);

          article.thumb = extractOgImage(html);

           if (article.thumb) {
            hydrated++;
            console.log(`Thumbnail found: ${article.title}`);
            }
          } catch (e) {
          console.warn(`Could not hydrate ${article.url}`);
            }
          }

            // --- Rest of script unchanged ---
            const arr = Array.from(news.values());
            fs.writeFileSync('articles.json', JSON.stringify(arr));
            console.log(`Done — ${arr.length} articles written to articles.json`);
          }

          main().catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Commit and push articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --staged --quiet || (git commit -m "chore: update article index [skip ci]" && git push)
